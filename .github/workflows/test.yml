name: Test

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  regression:
    name: Regression (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install tmux on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux

      - name: Install tmux on macOS
        if: runner.os == 'macOS'
        run: brew install tmux

      - name: Install dependencies
        run: npm ci

      - name: Smoke test
        run: npm run smoke

      - name: Check release notes
        run: npm run release:check

      - name: Regression test
        run: npm test
